# Nginx reverse proxy for origindemo-billing.in
# Place this at: /etc/nginx/sites-available/origindemo-billing.in
# Then: sudo ln -s /etc/nginx/sites-available/origindemo-billing.in /etc/nginx/sites-enabled/

# ── Main frontend ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name origindemo-billing.in www.origindemo-billing.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name origindemo-billing.in www.origindemo-billing.in;

    ssl_certificate     /etc/letsencrypt/live/origindemo-billing.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/origindemo-billing.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }
}

# ── API Gateway (Express) ─────────────────────────────────────────────────
server {
    listen 80;
    server_name api.origindemo-billing.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.origindemo-billing.in;

    ssl_certificate     /etc/letsencrypt/live/origindemo-billing.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/origindemo-billing.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://localhost:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# ── Billing Engine (Go) ───────────────────────────────────────────────────
server {
    listen 80;
    server_name billing.origindemo-billing.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name billing.origindemo-billing.in;

    ssl_certificate     /etc/letsencrypt/live/origindemo-billing.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/origindemo-billing.in/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://localhost:8082;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
